<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="utf-8" />
    <title>Orbitt</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="profile-card">
        <div class="banner"></div>
        <div class="avatar-wrapper">
            <img src="./assets/pfp.jpg" alt="Profile Picture" class="avatar" id="avatar" />
            <span class="status" id="status-dot"></span>
        </div>
        <div class="profile-info">
            <h3 class="username" id="username">Loading...</h3>
            <div class="tagline" id="custom-status">Fetching status...</div>
                <p style="color: #b9bbbe; text-align: left;">User Bio</p>
            <div class="tagline">
            <p class="bio">
                Depresed Femboy<br>
                Two Years Coding Experience<br>
                My website:<br><a class="clickable" href="./index.html">https://orbitt.sbs/</a><br>
                My extra pages on my site:<br><a class="clickable" href="./extras/extras.html">https://orbitt.sbs/extras/extras</a>
            </p>
            </div>
            <div id="spotify-status" class="tagline">
                <img id="spotify-album" alt="Album Cover" />
                <span id="spotify-text"></span>
            </div>
            <div id="game-status" class="tagline"></div>
        </div>
    </div>
    <script src="lanyard.js"></script>
    <script src="dropdown.js"></script>
</body>
</html>
